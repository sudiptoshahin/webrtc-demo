<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">WebRTC demo3</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link text-primary active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Pricing</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <main>
        <div class="jumbotron h-100 d-flex">

            <div class="container w-50">
                <img src="images/classroom.png" class="img-fluid">
            </div>

            <div class="container w-50 mt-5">
                <h1 class="text-center" style="font-size: 3rem;">
                    Where you can fulfill your learning
                </h1>
                <p style="font-size: 20px;" class="mt-2">
                 Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sint hic repellendus corporis perferendis nemo ipsam, quibusdam nulla fugiat iure nihil.</p>

                <ul class="display-center">
                    <li class="mt-5">
                        <button class="btn btn-outline-primary font-weight-bold join_meeting">Join meeting</button>
                        <button id="start_meeting" class="btn btn-primary mr-5">
                            <span class="material-icons mr-2">video_call</span>
                        Start a meeting</button>
                    </li>

                    <li>
                        <button class="btn btn-lg ml-2 btn-outline-secondary text-dark font-weight-bold display-center"
                            style="background-color: #ffffff;">
                            <span class="material-icons mr-2">keyboard</span>
                            <input type="text" id="meetingCode" name="meetingCode" placeholder="Enter meeting code" style="border: none">
                        </button>
                        <button class="btn btn-secondary join_meeting display-center">Join</button>
                    </li>
                </ul>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>

    <script>
      var code;
        const meetingCode = document.getElementById('meetingCode');
        const joinMeeting = document.querySelectorAll('.join_meeting').forEach(el => el.addEventListener('click', () => {
            meetingCode.focus();

            if(meetingCode.value != "") {
              code = meetingCode.value;
              const meetingUrl = window.location.origin+`?meetingId=${code}`;
              window.location.replace(meetingUrl);
            } else {
              window.alert('Please enter your meeting id');
            }
        }));

        const newMeeting = document.getElementById('start_meeting');
        newMeeting.addEventListener('click', () => {
            const code = Math.floor(Math.random() * 100000000);
            const meetingUrl = window.location.origin+`?meetingId=${code}`;
            window.location.replace(meetingUrl);
        });

    </script>
</body>
</html>
